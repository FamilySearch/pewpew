vars:
  port: ${e:PORT}
load_pattern:
- !linear
  from: 0%
  to: 100%
  over: 5s
config:
  client:
    request_timeout: 1m
    headers: {}
    keepalive: 90s
  general:
    auto_buffer_start_size: 5
    bucket_size: 1m
    log_provider_stats: true
    watch_transition_time: null
loggers: {}
providers:
  counter: !range
    start: 0
    end: 10
    step: 1
    repeat: false
    unique: false
  response_provider: !response
    auto_return: null
    buffer: auto
    unique: false
endpoints:
- method: GET
  url: http://localhost:${v:port}/?count=${p:counter}
  tags: {}
  declare: {}
  headers: {}
  body: null
  load_pattern: null
  peak_load: 600hpm
  provides:
    response_provider:
      query:
        select: '1'
        for_each: []
        where: null
      send: block
  on_demand: false
  logs: {}
  max_parallel_requests: null
  no_auto_returns: false
  request_timeout: null
- method: GET
  url: http://localhost:${v:port}/?value=${p:response_provider}
  tags: {}
  declare: {}
  headers: {}
  body: null
  load_pattern: null
  peak_load: 300hpm
  provides: {}
  on_demand: false
  logs: {}
  max_parallel_requests: null
  no_auto_returns: false
  request_timeout: null
