vars:
  port: ${e:PORT}
load_pattern:
  - !linear
      from: 100%
      to: 100%
      over: 5m
config:
  client:
    headers:
      Accept: application/json
  general:
    bucket_size: 1m
    log_provider_stats: true
providers:
  counterProvider: !range
    start: 1
    end: 10
  response1: !response
  response2: !response
endpoints:
- method: GET
  url: 'http://localhost:${v:port}?count=${p:counterProvider}'
  on_demand: true
  peak_load: 60hpm
  provides:
    response1:
      query:
        select: counterProvider
        where: response.status <= 300
      send: force
- method: GET
  url: 'http://localhost:${v:port}?count=${p:response1}'
  on_demand: true
  peak_load: 60hpm
  provides:
    response2:
      query:
        select: response1
        where: response.status <= 300
      send: force
- method: GET
  url: 'http://localhost:${v:port}?count=${p:response2}'
  peak_load: 60hpm
