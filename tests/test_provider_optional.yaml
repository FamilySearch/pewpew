load_pattern:
  - !linear
      to: 100%
      over: 5s
vars:
  port: ${e:PORT}
providers:
  counter: !range
    start: 0
    end: 10
  response_provider: !response
endpoints:
- url: http://localhost:${v:port}/?count=${p:counter}
  peak_load: 10hps
  provides:
    response_provider:
      query:
        select: 1
      send: if_not_full
- url: http://localhost:${v:port}/?value=${p:response_provider}
  peak_load: 5hps
