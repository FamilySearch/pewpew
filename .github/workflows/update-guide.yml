on:
  push:
    tags:
      - guide-latest

name: Release Guide
jobs:
  create-release:
    name: Update guide
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add Rust toolchain
        run: rustup toolchain install stable --profile minimal --no-self-update
      - run: rustup target add wasm32-unknown-unknown --toolchain stable
      - name: Add Node.js toolchain
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Build Results Viewer and Both Guide Versions
        run: |
          set -x
          # install mdbook and wasm-pack
          mkdir ~/bin
          PATH=$PATH:~/bin
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.20/mdbook-v0.4.20-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz -C ~/bin
          curl -sSL https://github.com/rustwasm/wasm-pack/releases/download/v0.12.1/wasm-pack-v0.12.1-x86_64-unknown-linux-musl.tar.gz \
            | tar -xz --strip-components=1 -C ~/bin --no-anchored wasm-pack

          # setup some envs to various paths for convenience
          PROJECT_ROOT=$PWD
          GUIDE_0_6_DIR=$(realpath $PROJECT_ROOT/guide/0.6.x)
          # Use the merged results-viewer-react with version selection
          RESULTS_VIEWER_REACT_DIR=$(realpath $PROJECT_ROOT/guide/results-viewer-react)
          WASM_LIB_DIR=$(realpath $PROJECT_ROOT/lib/hdr-histogram-wasm)
          WASM_OUTPUT_REACT_DIR=$RESULTS_VIEWER_REACT_DIR/lib/hdr-histogram-wasm

          CFG_GEN_DIR=$(realpath $PROJECT_ROOT/lib/config-gen)
          mkdir -p "$RESULTS_VIEWER_REACT_DIR/lib/config-gen"
          CFG_GEN_OUTPUT_REACT_DIR=$RESULTS_VIEWER_REACT_DIR/lib/config-gen

          # build the hdr-histogram-wasm for the results viewer
          cd $WASM_LIB_DIR
          wasm-pack build --release -t bundler -d $WASM_OUTPUT_REACT_DIR --scope fs

          # build the config-gen library for the HAR to YAML converter
          cd $CFG_GEN_DIR
          wasm-pack build --release -t bundler -d $CFG_GEN_OUTPUT_REACT_DIR --scope fs

          # build the results viewer (used by both guide versions)
          cd $RESULTS_VIEWER_REACT_DIR
          npm ci
          npm run build

          # build the 0.6.x guide (scripting version)
          cd $GUIDE_0_6_DIR
          mdbook build

          # build the 0.5.x guide (stable version)
          cd $PROJECT_ROOT/guide/0.5.x
          mdbook build

      - name: Assemble and Deploy to gh-pages
        run: |
          PROJECT_ROOT=$PWD

          # fetch gh-pages branch
          git fetch --no-tags origin gh-pages

          # create a temporary directory for assembly
          mkdir -p gh-pages-deploy
          cd gh-pages-deploy

          # create a git worktree of the gh-pages branch and clear it out
          git worktree add -B gh-pages gh-pages origin/gh-pages
          find gh-pages -not -name '.git' -not -name 'gh-pages' -delete

          # copy 0.5.x guide to root (default guide)
          cp -r $PROJECT_ROOT/guide/0.5.x/book/. gh-pages/

          # copy 0.6.x guide to /preview/ subdirectory
          mkdir -p gh-pages/preview
          cp -r $PROJECT_ROOT/guide/0.6.x/book/. gh-pages/preview/

          # copy the shared results viewer (from merged viewer with version selector)
          mkdir -p gh-pages/viewer
          cp -r $PROJECT_ROOT/guide/results-viewer-react/dist/. gh-pages/viewer/

          # commit and push to github
          git remote add github "https://$GITHUB_ACTOR:$GITHUB_TOKEN@github.com/$GITHUB_REPOSITORY.git"
          cd gh-pages
          git add --all

          git config --global user.name ${GITHUB_ACTOR}
          git config --global user.email ${GITHUB_ACTOR}@users.noreply.github.com

          git commit --amend --no-edit
          git push --force github gh-pages
