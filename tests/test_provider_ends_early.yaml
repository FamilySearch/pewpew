vars:
  port: ${e:PORT}
load_pattern:
- !linear
  from: 0%
  to: 100%
  over: 10s
config:
  client:
    request_timeout: 1m
    headers: {}
    keepalive: 90s
  general:
    auto_buffer_start_size: 5
    bucket_size: 1m
    log_provider_stats: true
    watch_transition_time: null
loggers: {}
providers:
  short_provider: !range
    start: 0
    end: 1
    step: 1
    repeat: false
    unique: false
endpoints:
- method: GET
  url: http://localhost:${v:port}/?id=${p:short_provider}
  tags: {}
  declare: {}
  headers: {}
  body: null
  load_pattern: null
  peak_load: 1200hpm
  provides: {}
  on_demand: false
  logs: {}
  max_parallel_requests: null
  no_auto_returns: false
  request_timeout: null
